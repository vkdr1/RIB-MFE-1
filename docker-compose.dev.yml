version: '3.8'

services:
  shell:
    image: node:20-alpine
    container_name: mfe-shell-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "4200:4200"
    command: sh -c "npm install && npm run start:shell"
    environment:
      - NODE_ENV=development
    networks:
      - mfe-network

  login:
    image: node:20-alpine
    container_name: mfe-login-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "4201:4201"
    command: sh -c "npm install && npm run start:login"
    environment:
      - NODE_ENV=development
    networks:
      - mfe-network

  user-dashboard:
    image: node:20-alpine
    container_name: mfe-user-dashboard-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "4202:4202"
    command: sh -c "npm install && npm run start:user-dashboard"
    environment:
      - NODE_ENV=development
    networks:
      - mfe-network

  gateway:
    image: nginx:alpine
    container_name: mfe-gateway-dev
    ports:
      - "80:80"
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - shell
      - login
      - user-dashboard
    networks:
      - mfe-network

networks:
  mfe-network:
    driver: bridge

