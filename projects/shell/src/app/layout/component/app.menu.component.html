<nav class="menu">
  @if (isAuthenticated()) {
    <ul>
      @for (item of authenticatedItems; track item.routerLink) {
        <li>
          <a [routerLink]="item.routerLink" routerLinkActive="active">
            @if (item.icon) {
              <span class="menu-icon">{{ item.icon }}</span>
            }
            <span class="menu-label">{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>
  }
</nav>
