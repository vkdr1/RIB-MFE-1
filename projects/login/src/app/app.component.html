<div class="login-container">
  <div class="login-card">
    <h2>Login</h2>
    <p class="subtitle">Welcome to MFE Pro</p>

    <form (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          [(ngModel)]="username"
          name="username"
          placeholder="Enter your username"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Enter your password"
          required
        />
      </div>

      <button type="submit" class="login-button">
        Login
      </button>
    </form>

    <p class="info-text">
      This is a remote micro-frontend (login)
    </p>
  </div>
</div>
