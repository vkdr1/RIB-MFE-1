<div class="lib-card" [class]="'lib-card--' + elevation">
  <div class="lib-card__header" *ngIf="title || subtitle">
    <h3 class="lib-card__title" *ngIf="title">{{ title }}</h3>
    <p class="lib-card__subtitle" *ngIf="subtitle">{{ subtitle }}</p>
  </div>
  <div class="lib-card__content">
    <ng-content></ng-content>
  </div>
</div>
