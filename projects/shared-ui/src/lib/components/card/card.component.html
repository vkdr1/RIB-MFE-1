<div class="lib-card" [class]="'lib-card--' + elevation">
  @if (title || subtitle) {
    <div class="lib-card__header">
      @if (title) { <h3 class="lib-card__title">{{ title }}</h3> }
      @if (subtitle) { <p class="lib-card__subtitle">{{ subtitle }}</p> }
    </div>
  }
  <div class="lib-card__content">
    <ng-content></ng-content>
  </div>
</div>
